<!DOCTYPE html>
<html>
<head>

<title>Train WiFi Portal</title>

<style>

body{
    position: relative;
margin:0;
font-family:Arial;

background:url("/static/images/pnr.jpg");
background-size:cover;
background-position:center;

height:100vh;
display:flex;
justify-content:flex-start;  
align-items:center;

padding-left:3%;    
/* padding-top: 2%;         */
top: 60% !important;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(24,26,47,0.85);
z-index:-1;
}

.container{
background:#242E49;
padding:40px;
width:360px;
border-radius:12px;
text-align:center;
padding-top: 4%;
}

.logo{
width:80px;
margin-bottom:10px;
}

h2{
color:#FDA481;
}

input{
width:100%;
padding:12px;
margin-top:12px;
background:#37415C;
border:none;
border-radius:6px;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#FDA481;
border:none;
border-radius:6px;
}

.error{
color:#B4182D;
margin-top:10px;
}

.footer{
margin-top:20px;
font-size:13px;
color:#aaa;
}

.page-title{
position:absolute;
top:35px;
width:90%;
text-align:center;

font-family:'Orbitron', sans-serif;
font-size:38px;
letter-spacing:4px;

color:#FDA481;
text-shadow:0 0 15px rgba(253,164,129,0.6);
}

.page-subtitle{
position:absolute;
top:80px;
width:90%;
text-align:center;

font-family:'Orbitron', sans-serif;
font-size:14px;
letter-spacing:2px;

color:#cfd6e6;
}

</style>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="page-title">
TRAIN WIFI ACCESS PORTAL
</div>

<div class="page-subtitle">
Passenger Authentication
</div>

<div class="container">

<img src="/static/images/logo.png" class="logo"> 

<h2>Train WiFi Access</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="pnr" placeholder="Enter PNR Number" maxlength="10">

<input type="text" name="mobile" placeholder="Enter Mobile Number" maxlength="10">

<button type="submit">Get OTP</button>

</form>

{% if message %}
<div class="error">{{message}}</div>
{% endif %}

<div class="footer">
Powered by RailwayNet
</div>

</div>

</body>
</html>
